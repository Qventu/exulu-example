version: '3.8'

services:
  exulu-redis:
    image: redis:7
    container_name: exulu-redis
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    networks:
      - exulu-network

networks:
  exulu-network:
    driver: bridge

volumes:
  redisdata:   Stores data outside the container to ensure persistence